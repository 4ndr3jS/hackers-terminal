<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Terminal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="green">

    <div id="color-switcher">
        <div class="dots-row" id="dots-trigger">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
        <div class="options">
            <div class="opt green active" data-theme="green">
                <span class="swatch"></span> Green
            </div>
            <div class="opt red" data-theme="red">
                <span class="swatch"></span> Red
            </div>
            <div class="opt white" data-theme="white">
                <span class="swatch"></span> White
            </div>
        </div>
    </div>

    <div class="hint" id="hint">
        Press any key or tap to begin
    </div>

    <div class="terminal">
        <div id="lines">
            <span class="line current cmd-typing" id="current-line">user@kali:~$ <span class="blinking-cursor" id="cursor"></span></span>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
